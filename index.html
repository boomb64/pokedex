<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon Shiny & Catch Tracker</title>
  <style>
    :root {
      --bg-solid: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --panel-bg: rgba(255, 255, 255, 0.58);
      --panel-border: rgba(255, 255, 255, 0.28);
      --shadow: 0 12px 32px rgba(15, 23, 42, 0.14);
      --accent: #4f7cff;
      --accent-soft: rgba(79, 124, 255, 0.12);

      --button-bg: #ffffff;
      --button-text: #111827;
      --button-border: #d1d5db;
      --button-hover: #f8fafc;

      --cell-size: 100px;
      --cols: 8;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text: #f8fafc;
        --muted: #cbd5e1;
        --panel-bg: rgba(9, 9, 11, 0.52);
        --panel-border: rgba(255, 255, 255, 0.12);

        --button-bg: #000000;
        --button-text: #f9fafb;
        --button-border: #374151;
        --button-hover: #111111;
      }
    }

    @keyframes bgShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: var(--bg-solid);
      background-attachment: fixed;
      min-height: 100vh;
      height: 100vh;
      overflow: hidden;
      transition: background 0.25s ease;
    }

    .page {
      max-width: 1400px;
      height: 100vh;
      margin: 0 auto;
      padding: 24px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    .header {
      position: sticky;
      top: 16px;
      z-index: 30;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 18px;
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      flex: 0 0 auto;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
    }

    .header-controls {
      display: flex;
      gap: 10px;
    }

    .view-toggle,
    .settings-button,
    .variant-toggle {
      border: 1px solid var(--button-border);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--button-bg);
      color: var(--button-text);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
      white-space: nowrap;
    }

    .view-toggle:hover,
    .settings-button:hover,
    .variant-toggle:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.08);
      border-color: #aab3c5;
      background: var(--button-hover);
    }

    .variant-toggle.active {
      color: #111827;
      background: linear-gradient(#f8fbff, #f8fbff) padding-box, linear-gradient(135deg, #6366f1, #22c55e, #06b6d4) border-box;
      border-color: transparent;
      box-shadow: 0 8px 18px rgba(99, 102, 241, 0.18);
    }

    .hint {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      align-items: center;
    }

    .filter-select {
      border: 1px solid var(--button-border);
      border-radius: 999px;
      padding: 9px 36px 9px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--button-bg) url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E") no-repeat right 12px center;
      background-size: 16px;
      color: var(--button-text);
      appearance: none;
      -webkit-appearance: none;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
    }

    .filter-select:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.08);
      border-color: #aab3c5;
      background-color: var(--button-hover);
    }

    .reset-btn {
      border: 2px solid transparent;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--button-bg);
      color: var(--button-text);
      border-color: var(--button-border);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
      user-select: none;
      margin-left: auto;
    }

    .reset-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.08);
      background: var(--button-hover);
    }

    .search-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1 1 320px;
      max-width: 420px;
    }

    #searchBox {
      width: 100%;
      padding: 12px 44px 12px 14px;
      font-size: 16px;
      border: 1px solid var(--button-border);
      border-radius: 14px;
      outline: none;
      background: var(--button-bg);
      color: var(--button-text);
      box-sizing: border-box;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    #searchBox:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .clear-search {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 999px;
      background: var(--button-hover);
      color: var(--button-text);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .clear-search.visible { display: inline-flex; }

    .status-line {
      margin-left: auto;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
      display: flex;
      gap: 16px;
    }
    
    .status-group {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .status-val { font-weight: 800; color: var(--text); }
    .status-shiny { color: #d97706; }
    .status-caught { color: #059669; }

    .grid-container {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 14px;
      margin-bottom: 0;
      border-radius: 18px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s ease;
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
    }

    .grid-container.scrollable {
      box-shadow:
        0 12px 32px rgba(15, 23, 42, 0.14),
        inset 0 -14px 14px -14px rgba(0, 0, 0, 0.22);
    }

    .grid {
      display: grid;
      gap: 8px;
      width: 100%;
      justify-content: start;
      align-content: start;
      grid-template-columns: repeat(var(--cols), var(--cell-size));
    }

    .cell {
      aspect-ratio: 1;
      width: 100%;
      border: 1px solid #d8dde6;
      background: rgba(255, 255, 255, 0.95);
      cursor: pointer;
      border-radius: 14px;
      padding: 0;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      position: relative;
    }

    .cell:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
    }

    .cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: filter 0.3s ease, opacity 0.3s ease;
    }

    /* SILHOUETTE EFFECT */
    .cell.state-off img {
      filter: brightness(0) invert(0.35);
      opacity: 0.45;
    }

    .cell-label { display: none; }

    .cell.active { border-color: var(--accent); }
    .cell.extra { border-color: orange; }

    .cell.state-off { border-color: rgba(148, 163, 184, 0.65); }
    .cell.state-on { border-color: rgba(134, 239, 172, 0.95); }
    .cell.state-extra { border-color: rgba(251, 191, 36, 0.95); }

    /* BOTTOM TABS NAVIGATION */
    .bottom-nav {
      position: sticky;
      bottom: 16px;
      z-index: 30;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 8px 12px;
      margin-top: 18px;
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      display: flex;
      gap: 8px;
      overflow-x: auto;
      flex: 0 0 auto;
    }
    
    .bottom-nav::-webkit-scrollbar { display: none; }
    .bottom-nav { -ms-overflow-style: none; scrollbar-width: none; }

    .nav-tab {
      padding: 10px 16px;
      border-radius: 12px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }
    
    .nav-tab:hover {
      background: rgba(0, 0, 0, 0.05);
      color: var(--text);
    }
    
    @media (prefers-color-scheme: dark) {
      .nav-tab:hover { background: rgba(255, 255, 255, 0.1); }
    }
    
    .nav-tab.active {
      background: var(--button-bg);
      color: var(--button-text);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
      border: 1px solid var(--button-border);
    }

    .cell-tooltip {
      position: fixed;
      z-index: 1000;
      display: none;
      max-width: 220px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--panel-border);
      color: var(--text);
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.18);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      pointer-events: none;
      white-space: pre-line;
      font-size: 13px;
      line-height: 1.35;
    }

    .cell-tooltip.visible { display: block; }

    .cell-tooltip.state-off { background: rgba(148, 163, 184, 0.34); border-color: rgba(100, 116, 139, 0.35); color: #0f172a; }
    .cell-tooltip.state-on { background: rgba(187, 247, 208, 0.85); border-color: rgba(34, 197, 94, 0.35); color: #14532d; }
    .cell-tooltip.state-extra { background: rgba(254, 240, 138, 0.85); border-color: rgba(245, 158, 11, 0.40); color: #854d0e; }

    .settings-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(15, 23, 42, 0.45);
      z-index: 50;
    }

    .settings-overlay.open { display: flex; }

    .settings-card {
      width: min(560px, 100%);
      border-radius: 20px;
      background: var(--panel-bg);
      color: var(--text);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
    }

    .settings-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .settings-header h2 { margin: 0; font-size: 20px; }

    .settings-close {
      border: 1px solid var(--button-border);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--button-bg);
      color: var(--button-text);
      transition: background 0.15s ease, transform 0.15s ease;
    }
    .settings-close:hover { transform: translateY(-1px); background: var(--button-hover); }

    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
    .color-field { display: flex; flex-direction: column; gap: 8px; font-size: 14px; font-weight: 600; }
    .color-input { width: 100%; height: 48px; padding: 0; border: none; border-radius: 14px; background: transparent; cursor: pointer; }
    .color-input::-webkit-color-swatch-wrapper { padding: 0; }
    .color-input::-webkit-color-swatch { border: 1px solid var(--button-border); border-radius: 14px; }
    .color-input::-moz-color-swatch { border: 1px solid var(--button-border); border-radius: 14px; }

    .preset-title { margin: 0 0 10px; font-size: 14px; font-weight: 700; color: var(--muted); }
    .preset-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
    .preset-btn { border: 1px solid var(--button-border); border-radius: 999px; padding: 10px 14px; font-size: 14px; font-weight: 600; cursor: pointer; background: var(--button-bg); color: var(--button-text); }

    .layout-option {
      width: 100%; border: 1px solid var(--button-border); border-radius: 18px; padding: 14px 16px; cursor: pointer; text-align: left; background: var(--button-bg); color: var(--button-text); display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px;
    }
    .layout-option.active {
      color: #111827; background: linear-gradient(#f8fbff, #f8fbff) padding-box, linear-gradient(135deg, #6366f1, #22c55e, #06b6d4) border-box; border-color: transparent; box-shadow: 0 8px 18px rgba(99, 102, 241, 0.18);
    }
    .layout-option-title { font-size: 15px; font-weight: 700; }
    .layout-option-desc { font-size: 13px; font-weight: 500; color: var(--muted); }

    .settings-footer { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .settings-action { border: 1px solid var(--button-border); border-radius: 999px; padding: 10px 14px; font-size: 14px; font-weight: 600; cursor: pointer; background: var(--button-bg); color: var(--button-text); }

    .page.alt-layout .cell { aspect-ratio: auto; min-height: calc(var(--cell-size) * 1.6); display: flex; flex-direction: column; align-items: stretch; justify-content: flex-start; padding: 0; border-radius: 18px; background: rgba(255, 255, 255, 0.96); }
    .page.alt-layout .cell img { width: 100%; height: calc(var(--cell-size) * 1.12); flex: 1 1 auto; object-fit: cover; }
    .page.alt-layout .cell-label { display: block; padding: 10px 12px; border-top: 1px solid rgba(148, 163, 184, 0.35); font-size: 13px; font-weight: 700; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    /* Variant visual tweaks for Alternate and List Layouts */
    .page.alt-layout .cell[data-is-variant="true"] .cell-label { font-style: italic; }

    .page.alt-layout .cell.state-off .cell-label { background: rgba(148, 163, 184, 0.26); color: #334155; }
    .page.alt-layout .cell.state-on .cell-label { background: rgba(187, 247, 208, 0.82); color: #166534; }
    .page.alt-layout .cell.state-extra .cell-label { background: rgba(254, 240, 138, 0.82); color: #854d0e; }

    .page.list-mode .grid { grid-template-columns: 1fr; gap: 10px; }
    .page.list-mode .cell { aspect-ratio: auto; height: 74px; width: 100%; display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 16px; }
    .page.list-mode .cell img { width: 52px; height: 52px; border-radius: 10px; flex: 0 0 auto; }
    .page.list-mode .cell-label { display: block; font-size: 14px; font-weight: 600; color: #374151; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .page.list-mode .cell.state-off .cell-label { color: #334155; }
    .page.list-mode .cell.state-on .cell-label { color: #166534; }
    .page.list-mode .cell.state-extra .cell-label { color: #854d0e; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="header-top">
        <h1>Pokémon Tracker</h1>
        <div class="header-controls">
          <button id="variantToggle" class="variant-toggle" type="button" title="Shortcut: V">Variants: Hidden</button>
          <button id="viewToggle" class="view-toggle" type="button">List View</button>
        </div>
      </div>

      <p class="hint">Left click to mark Caught. Right click to mark Caught Shiny. Press <b>V</b> to toggle Variants.</p>

      <div class="toolbar">
        <select id="subDexFilterSelect" class="filter-select" style="display: none;">
          <option value="all">Region: All</option>
        </select>
        
        <select id="stateFilterSelect" class="filter-select">
          <option value="all">Filter: Any State</option>
          <option value="caught">Filter: Caught (Any)</option>
          <option value="missing">Filter: Missing</option>
          <option value="shiny">Filter: Shiny</option>
        </select>

        <button id="resetFilters" class="reset-btn" type="button">Reset Filters</button>
        <button id="settingsButton" class="settings-button" type="button">Settings</button>
      </div>

      <div class="search-row">
        <div class="search-wrap">
          <input type="text" id="searchBox" placeholder="Search by Dex # or Pokémon name...">
          <button id="clearSearch" class="clear-search" type="button" aria-label="Clear search">×</button>
        </div>
        <div id="statusLine" class="status-line">
          <div class="status-group">Showing: <span id="statVisible" class="status-val">0</span></div>
          <div class="status-group">Caught: <span id="statCaught" class="status-val status-caught">0</span></div>
          <div class="status-group">Shiny: <span id="statShiny" class="status-val status-shiny">0</span></div>
        </div>
      </div>
    </div>

    <div class="grid-container" id="gridContainer">
      <div class="grid" id="grid"></div>
    </div>
    
    <!-- BOTTOM TABS NAVIGATION -->
    <div class="bottom-nav">
       <button class="nav-tab active" data-game="national">National Dex</button>
       <button class="nav-tab" data-game="za">Legends: Z-A</button>
       <button class="nav-tab" data-game="sv">Scarlet & Violet</button>
       <button class="nav-tab" data-game="pla">Legends: Arceus</button>
       <button class="nav-tab" data-game="swsh">Sword & Shield</button>
    </div>
  </div>

  <div class="cell-tooltip" id="cellTooltip" aria-hidden="true"></div>

  <div class="settings-overlay" id="settingsOverlay" aria-hidden="true">
    <div class="settings-card" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="settings-header">
        <h2 id="settingsTitle">Background Settings</h2>
        <button id="closeSettings" class="settings-close" type="button">Close</button>
      </div>

      <div class="settings-grid">
        <label class="color-field" for="bgColor1">Color 1 <input id="bgColor1" class="color-input" type="color" value="#ffffff"></label>
        <label class="color-field" for="bgColor2">Color 2 <input id="bgColor2" class="color-input" type="color" value="#ffffff"></label>
      </div>

      <button id="altLayoutToggle" class="layout-option" type="button" aria-pressed="false">
        <span class="layout-option-title">Alternate Layout</span>
        <span class="layout-option-desc">Image on top, label below</span>
      </button>

      <p class="preset-title">Presets</p>
      <div class="preset-grid">
        <button class="preset-btn" type="button" data-c1="#0f172a" data-c2="#38bdf8">Ocean</button>
        <button class="preset-btn" type="button" data-c1="#4c1d95" data-c2="#ec4899">Sunset</button>
        <button class="preset-btn" type="button" data-c1="#064e3b" data-c2="#22c55e">Forest</button>
        <button class="preset-btn" type="button" data-c1="#111827" data-c2="#f59e0b">Ember</button>
      </div>

      <div class="settings-footer">
        <button id="systemDefaultBtn" class="settings-action" type="button">Use System Default</button>
      </div>
    </div>
  </div>

  <script>
    const page = document.querySelector(".page");
    const grid = document.getElementById("grid");
    const searchBox = document.getElementById("searchBox");
    const clearSearch = document.getElementById("clearSearch");
    
    // Stats Elements
    const statVisible = document.getElementById("statVisible");
    const statCaught = document.getElementById("statCaught");
    const statShiny = document.getElementById("statShiny");

    const gridContainer = document.getElementById("gridContainer");
    const viewToggle = document.getElementById("viewToggle");
    const variantToggle = document.getElementById("variantToggle");
    const resetFilters = document.getElementById("resetFilters");
    const stateFilterSelect = document.getElementById("stateFilterSelect");
    const subDexFilterSelect = document.getElementById("subDexFilterSelect");

    const settingsButton = document.getElementById("settingsButton");
    const settingsOverlay = document.getElementById("settingsOverlay");
    const closeSettings = document.getElementById("closeSettings");
    const systemDefaultBtn = document.getElementById("systemDefaultBtn");
    const bgColor1 = document.getElementById("bgColor1");
    const bgColor2 = document.getElementById("bgColor2");
    const altLayoutToggle = document.getElementById("altLayoutToggle");
    const cellTooltip = document.getElementById("cellTooltip");

    let totalVisibleCells = 0;
    const TARGET_CELL_SIZE = 100;
    const GAP = 8;

    const UI_STATE_KEY = "gridUiState";
    const CELL_STATE_KEY = "cellStates";

    // --- THE REGIONAL DICTIONARY ---
    const regionalVariants = [
      // Alolan
      { id: "19-A", apiId: "10091", name: "Alolan Rattata", parentId: "19" },
      { id: "20-A", apiId: "10092", name: "Alolan Raticate", parentId: "20" },
      { id: "26-A", apiId: "10093", name: "Alolan Raichu", parentId: "26" },
      { id: "27-A", apiId: "10094", name: "Alolan Sandshrew", parentId: "27" },
      { id: "28-A", apiId: "10095", name: "Alolan Sandslash", parentId: "28" },
      { id: "37-A", apiId: "10103", name: "Alolan Vulpix", parentId: "37" },

        { id: "all", name: "Region: All Legends: Arceus" },
        { id: "pla_base", name: "Base Game (Hisui)" }
      ],
      "swsh": [
        { id: "all", name: "Region: All Sword/Shield" },
        { id: "swsh_base", name: "Base Game (Galar)" }
      ]
    };

    let allCells = [];
    const cellRegistry = new Map();
    let savedStates = {}; // Will be dynamically loaded based on the current tab

    const defaultUiState = { 
      search: "", 
      viewMode: "grid", 
      altLayout: false, 
      showVariants: false, 
      stateFilter: "all", 
      gameFilter: "national", 
      subDexFilter: "all", 
      filters: [], 
      theme: { mode: "system" } 
    };
    
    function loadUiState() {
      const raw = localStorage.getItem(UI_STATE_KEY);
      if (!raw) return { ...defaultUiState };
      try {
        const p = JSON.parse(raw);
        return {
          search: typeof p.search === "string" ? p.search : defaultUiState.search,
          viewMode: p.viewMode === "list" ? "list" : "grid",
          altLayout: Boolean(p.altLayout),
          showVariants: Boolean(p.showVariants),
          stateFilter: p.stateFilter || "all",
          gameFilter: p.gameFilter || "national",
          subDexFilter: p.subDexFilter || "all", 
          filters: Array.isArray(p.filters) ? p.filters : [],
          theme: p.theme && typeof p.theme === "object" ? p.theme : { mode: "system" }
        };
      } catch { return { ...defaultUiState }; }
    }

    function saveUiState() {
      localStorage.setItem(UI_STATE_KEY, JSON.stringify({
        search: searchBox.value, 
        viewMode, 
        altLayout: altLayoutEnabled, 
        showVariants: showVariantsEnabled,
        stateFilter: stateFilterSelect.value,
        gameFilter: currentGameTab,
        subDexFilter: subDexFilterSelect.value, 
        filters: [...filterModes.entries()], 
        theme: currentTheme
      }));
    }

    const loadedUiState = loadUiState();
    const filterModes = new Map(loadedUiState.filters);
    let viewMode = loadedUiState.viewMode;
    let altLayoutEnabled = loadedUiState.altLayout;
    let showVariantsEnabled = loadedUiState.showVariants;
    let currentGameTab = loadedUiState.gameFilter;
    let currentTheme = loadedUiState.theme;

    // --- NEW: Storage logic dynamically tied to the active Game Tab ---
    function getStorageKey() {
      return currentGameTab === "national" ? CELL_STATE_KEY : `${CELL_STATE_KEY}_${currentGameTab}`;
    }

    function loadGameStates() {
      savedStates = JSON.parse(localStorage.getItem(getStorageKey()) || "{}");
    }

    function getSpriteUrl(apiId, isShiny) {
      const base = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/home";
      return isShiny ? `${base}/shiny/${apiId}.png` : `${base}/${apiId}.png`;
    }

    function getCellState(id) {
      const st = savedStates[id];
      return st ? { base: Number(st.base ?? 0), extra: Boolean(st.extra ?? false) } : { base: 0, extra: false };
    }

    function saveCellState(id, state) {
      savedStates[id] = state;
      localStorage.setItem(getStorageKey(), JSON.stringify(savedStates));
    }

    function stateName(state) { return state.extra ? "Caught Shiny" : (state.base === 1 ? "Caught" : "Uncaught"); }
    function stateClass(state) { return state.extra ? "state-extra" : (state.base === 1 ? "state-on" : "state-off"); }

    function updateCellVisuals(record) {
      const { dom, img, data, state } = record;
      img.src = getSpriteUrl(data.apiId, state.extra);
      dom.classList.toggle("active", state.base === 1);
      dom.classList.toggle("extra", state.extra);
      dom.classList.remove("state-off", "state-on", "state-extra");
      dom.classList.add(stateClass(state));
    }

    function hideTooltip() { cellTooltip.className = "cell-tooltip"; cellTooltip.setAttribute("aria-hidden", "true"); }
    function positionTooltip(e) {
      const pad = 14; let x = e.clientX + pad, y = e.clientY + pad;
      const rect = cellTooltip.getBoundingClientRect();
      if (x + rect.width > window.innerWidth) x = e.clientX - rect.width - pad;
      if (y + rect.height > window.innerHeight) y = e.clientY - rect.height - pad;
      cellTooltip.style.left = `${Math.max(8, x)}px`; cellTooltip.style.top = `${Math.max(8, y)}px`;
    }

    function showTooltip(e, data, state) {
      cellTooltip.textContent = `Dex #${data.id}\n${data.name}\nStatus: ${stateName(state)}`;
      cellTooltip.className = `cell-tooltip visible ${stateClass(state)}`;
      cellTooltip.setAttribute("aria-hidden", "false");
      positionTooltip(e);
    }

    function updateClearButton() { clearSearch.classList.toggle("visible", searchBox.value.trim().length > 0); }
    
    function updateStatusDisplay(totalFilteredScope) { 
      let caughtCount = 0;
      let shinyCount = 0;

      const activeGameDex = getActiveGameDex();

      cellRegistry.forEach((rec, id) => {
        if (rec.data.isVariant && !showVariantsEnabled) return;
        if (activeGameDex && !activeGameDex.includes(id)) return;
        
        if (rec.state.base === 1) caughtCount++;
        if (rec.state.extra) shinyCount++;
      });

      statVisible.textContent = totalVisibleCells;
      statCaught.textContent = `${caughtCount} / ${totalFilteredScope}`;
      statShiny.textContent = shinyCount;
    }
    
    function updateScrollBorder() { gridContainer.classList.toggle("scrollable", gridContainer.scrollHeight > gridContainer.clientHeight); }

    function layoutGrid() {
      if (viewMode !== "grid") return;
      const styles = getComputedStyle(gridContainer);
      const avail = gridContainer.clientWidth - (parseFloat(styles.paddingLeft) || 0) - (parseFloat(styles.paddingRight) || 0);
      const cols = Math.max(1, Math.floor((avail + GAP) / (TARGET_CELL_SIZE + GAP)));
      const cellSize = Math.max(32, Math.floor((avail - GAP * (cols - 1)) / cols));
      grid.style.setProperty("--cols", cols);
      grid.style.setProperty("--cell-size", `${cellSize}px`);
    }

    function prefersDarkMode() { return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches; }
    function getSystemTheme() { const dark = prefersDarkMode(); return { mode: "system", color1: dark ? "#000000" : "#ffffff", color2: dark ? "#000000" : "#ffffff" }; }

    function applyTheme(theme, persist = true) {
      const nextTheme = theme.mode === "custom" ? { mode: "custom", color1: theme.color1, color2: theme.color2 } : { mode: "system" };
      currentTheme = nextTheme;
      const res = nextTheme.mode === "system" ? getSystemTheme() : nextTheme;
      if (res.color1 !== res.color2) {
        document.body.style.background = `linear-gradient(135deg, ${res.color1}, ${res.color2})`;
        document.body.style.backgroundSize = "250% 250%";
        document.body.style.animation = "bgShift 30s ease-in-out infinite";
      } else {
        document.body.style.background = res.color1;
        document.body.style.animation = "none";
      }
      bgColor1.value = res.color1; bgColor2.value = res.color2;
      if (persist) saveUiState();
    }

    function applyAltLayout(enabled, persist = true) {
      altLayoutEnabled = !!enabled;
      page.classList.toggle("alt-layout", altLayoutEnabled);
      altLayoutToggle.classList.toggle("active", altLayoutEnabled);
      altLayoutToggle.setAttribute("aria-pressed", String(altLayoutEnabled));
      if (persist) saveUiState();
      layoutGrid();
    }

    function setViewMode(nextMode, persist = true) {
      viewMode = nextMode === "list" ? "list" : "grid";
      page.classList.toggle("grid-mode", viewMode === "grid");
      page.classList.toggle("list-mode", viewMode === "list");
      viewToggle.textContent = viewMode === "grid" ? "List View" : "Grid View";
      if (persist) saveUiState();
      layoutGrid();
    }

    function toggleVariants(persist = true) {
      showVariantsEnabled = !showVariantsEnabled;
      variantToggle.textContent = showVariantsEnabled ? "Variants: Shown" : "Variants: Hidden";
      variantToggle.classList.toggle("active", showVariantsEnabled);
      
      if (persist) {
        saveUiState();
        applyFilters();
      }
    }

    function initializeDOM() {
      const fragment = document.createDocumentFragment();
      allCells.forEach(data => {
        const state = getCellState(data.id);
        const cell = document.createElement("button");
        cell.className = "cell"; 
        cell.type = "button"; 
        cell.dataset.cellId = data.id;
        cell.dataset.isVariant = data.isVariant;

        const img = document.createElement("img");
        img.loading = "lazy"; 
        img.alt = data.name;

        const label = document.createElement("span");
        label.className = "cell-label"; 
        label.textContent = `#${data.id} ${data.name}`;

        cell.appendChild(img); cell.appendChild(label); fragment.appendChild(cell);

        const record = { dom: cell, img, data, state };
        updateCellVisuals(record);
        cellRegistry.set(data.id, record);
      });
      grid.appendChild(fragment);
    }

    function getActiveGameDex() {
      if (currentGameTab === "national") return null;
      
      const subDex = subDexFilterSelect.value;
      if (subDex !== "all") {
        return gameDexes[subDex];
      } else {
        // Combine all sub-dexes for the current game tab to show "All"
        const regions = gameRegions[currentGameTab].filter(r => r.id !== "all").map(r => r.id);
        let combined = [];
        let seen = new Set();
        regions.forEach(reg => {
          if (gameDexes[reg]) {
            gameDexes[reg].forEach(id => {
              if (!seen.has(id)) {
                seen.add(id);
                combined.push(id);
              }
            });
          }
        });
        return combined;
      }
    }

    function applyFilters() {
      const q = searchBox.value.trim().toLowerCase();
      const sf = stateFilterSelect.value;
      const activeGameDex = getActiveGameDex();
      
      let count = 0;
      let totalFilteredScope = 0;

      cellRegistry.forEach((rec, id) => {
        if (rec.data.isVariant && !showVariantsEnabled) {
          rec.dom.style.display = "none";
          return;
        }
        
        if (activeGameDex && !activeGameDex.includes(id)) {
          rec.dom.style.display = "none";
          return;
        }

        totalFilteredScope++;

        let stateMatch = true;
        if (sf === "caught") stateMatch = rec.state.base === 1;
        if (sf === "missing") stateMatch = rec.state.base === 0;
        if (sf === "shiny") stateMatch = rec.state.extra === true;

        const matchQ = !q || id.toLowerCase().includes(q) || rec.data.name.toLowerCase().includes(q);
        
        if (matchQ && stateMatch) {
          rec.dom.style.display = ""; 
          
          if (activeGameDex) {
            rec.dom.style.order = activeGameDex.indexOf(id);
          } else {
            rec.dom.style.order = "";
          }
          count++;
        } else { 
          rec.dom.style.display = "none"; 
        }
      });

      totalVisibleCells = count;
      updateStatusDisplay(totalFilteredScope); 
      updateClearButton(); 
      requestAnimationFrame(updateScrollBorder);
    }

    // Grid Event Delegation
    grid.addEventListener("click", (e) => {
      const el = e.target.closest(".cell"); if (!el) return;
      const rec = cellRegistry.get(el.dataset.cellId); if (!rec) return;

      if (rec.state.extra) { 
        rec.state.extra = false; 
        rec.state.base = 1; 
      } else { 
        rec.state.base = rec.state.base === 1 ? 0 : 1; 
      }

      saveCellState(rec.data.id, rec.state); 
      updateCellVisuals(rec);
      
      if (cellTooltip.classList.contains("visible")) showTooltip(e, rec.data, rec.state);
      
      if (stateFilterSelect.value !== "all") { applyFilters(); } 
      else { 
        let scopeTotal = 0;
        const activeGameDex = getActiveGameDex();
        cellRegistry.forEach((r, idx) => {
          if (r.data.isVariant && !showVariantsEnabled) return;
          if (activeGameDex && !activeGameDex.includes(idx)) return;
          scopeTotal++;
        });
        updateStatusDisplay(scopeTotal); 
      }
    });

    grid.addEventListener("contextmenu", (e) => {
      const el = e.target.closest(".cell"); if (!el) return;
      e.preventDefault(); const rec = cellRegistry.get(el.dataset.cellId); if (!rec) return;

      rec.state.extra = !rec.state.extra;
      if (rec.state.extra) { rec.state.base = 1; }
      
      saveCellState(rec.data.id, rec.state); 
      updateCellVisuals(rec);
      
      if (cellTooltip.classList.contains("visible")) showTooltip(e, rec.data, rec.state);

      if (stateFilterSelect.value !== "all") { applyFilters(); } 
      else { 
        let scopeTotal = 0;
        const activeGameDex = getActiveGameDex();
        cellRegistry.forEach((r, idx) => {
          if (r.data.isVariant && !showVariantsEnabled) return;
          if (activeGameDex && !activeGameDex.includes(idx)) return;
          scopeTotal++;
        });
        updateStatusDisplay(scopeTotal); 
      }
    });

    grid.addEventListener("mouseover", (e) => { const el = e.target.closest(".cell"); if (el) showTooltip(e, cellRegistry.get(el.dataset.cellId).data, cellRegistry.get(el.dataset.cellId).state); });
    grid.addEventListener("mousemove", (e) => { if (cellTooltip.classList.contains("visible")) positionTooltip(e); });
    grid.addEventListener("mouseout", (e) => { const el = e.target.closest(".cell"); if (el && !el.contains(e.relatedTarget)) hideTooltip(); });

    // Modals & inputs
    function openSettings() { settingsOverlay.classList.add("open"); settingsOverlay.setAttribute("aria-hidden", "false"); }
    function closeSettingsPanel() { settingsOverlay.classList.remove("open"); settingsOverlay.setAttribute("aria-hidden", "true"); }
    settingsButton.addEventListener("click", openSettings);
    closeSettings.addEventListener("click", closeSettingsPanel);
    settingsOverlay.addEventListener("click", (e) => { if (e.target === settingsOverlay) closeSettingsPanel(); });
    
    // Global Keybinds (Escape and V)
    document.addEventListener("keydown", (e) => { 
      if (e.key === "Escape") { 
        closeSettingsPanel(); 
        hideTooltip(); 
      }
      if (e.key.toLowerCase() === 'v' && e.target.tagName !== 'INPUT') { toggleVariants(); }
    });

    // BOTTOM NAVIGATION TAB SWITCHING
    document.querySelectorAll(".nav-tab").forEach(tab => {
      tab.addEventListener("click", () => {
        currentGameTab = tab.dataset.game;
        
        // Update Top Dropdown
        const regions = gameRegions[currentGameTab];
        subDexFilterSelect.innerHTML = regions.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
        subDexFilterSelect.value = "all"; // Reset to 'all regions' on tab switch
        subDexFilterSelect.style.display = currentGameTab === "national" ? "none" : "";

        // UI Updates
        document.querySelectorAll(".nav-tab").forEach(t => t.classList.toggle("active", t.dataset.game === currentGameTab));
        
        // Load the states specifically for the clicked tab
        loadGameStates();

        // Visually update the entire DOM memory with the newly loaded states
        cellRegistry.forEach((rec, id) => {
          rec.state = getCellState(id);
          updateCellVisuals(rec);
        });

        // Save current tab preference and reorganize the grid
        saveUiState();
        applyFilters();
      });
    });

    stateFilterSelect.addEventListener("change", () => { saveUiState(); applyFilters(); });
    subDexFilterSelect.addEventListener("change", () => { saveUiState(); applyFilters(); });
    variantToggle.addEventListener("click", () => toggleVariants());
    resetFilters.addEventListener("click", () => { 
      stateFilterSelect.value = "all";
      subDexFilterSelect.value = "all";
      saveUiState(); 
      applyFilters(); 
    });
    
    searchBox.addEventListener("input", () => { saveUiState(); applyFilters(); });
    clearSearch.addEventListener("click", () => { searchBox.value = ""; saveUiState(); applyFilters(); searchBox.focus(); });
    bgColor1.addEventListener("input", () => applyTheme({ mode: "custom", color1: bgColor1.value, color2: bgColor2.value }));
    bgColor2.addEventListener("input", () => applyTheme({ mode: "custom", color1: bgColor1.value, color2: bgColor2.value }));
    document.querySelectorAll(".preset-btn").forEach(b => b.addEventListener("click", () => applyTheme({ mode: "custom", color1: b.dataset.c1, color2: b.dataset.c2 })));
    systemDefaultBtn.addEventListener("click", () => applyTheme({ mode: "system" }));
    altLayoutToggle.addEventListener("click", () => applyAltLayout(!altLayoutEnabled));
    viewToggle.addEventListener("click", () => setViewMode(viewMode === "grid" ? "list" : "grid"));

    new ResizeObserver(() => { layoutGrid(); updateScrollBorder(); }).observe(gridContainer);
    window.addEventListener("resize", () => { layoutGrid(); updateScrollBorder(); });
    window.addEventListener("scroll", hideTooltip, { passive: true });

    // ASYNC BOOTLOADER
    async function bootTracker() {
      grid.style.display = "block";
      grid.innerHTML = `<div style="padding: 60px 20px; text-align:center; font-family:sans-serif; color:var(--muted);"><b>Connecting to PokéAPI...</b><br><small>Assembling National Dex (1 - 1025)</small></div>`;

      try {
        const res = await fetch("https://pokeapi.co/api/v2/pokemon?limit=1025");
        if (!res.ok) throw new Error("Network response was not ok");
        const masterJson = await res.json();

        // Build base
        let baseCells = masterJson.results.map((item, index) => {
          return {
            id: String(index + 1),
            apiId: String(index + 1),
            name: item.name.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' '),
            isVariant: false
          }
        });

        // Inject variants
        allCells = [];
        baseCells.forEach(baseCell => {
          allCells.push(baseCell);
          const variants = regionalVariants.filter(v => v.parentId === baseCell.id);
          variants.forEach(variant => {
            allCells.push({
              id: variant.id,
              apiId: variant.apiId,
              name: variant.name,
              isVariant: true
            });
          });
        });

        grid.style.display = ""; grid.innerHTML = "";

        // Load correct states for the active tab before painting the DOM
        loadGameStates();

        // UI Initialization
        initializeDOM();
        applyTheme(currentTheme, false);
        setViewMode(viewMode, false);
        applyAltLayout(altLayoutEnabled, false);
        
        // Setup Sub Dex Filter Dropdown
        const regions = gameRegions[currentGameTab];
        subDexFilterSelect.innerHTML = regions.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
        if (regions.find(r => r.id === loadedUiState.subDexFilter)) {
          subDexFilterSelect.value = loadedUiState.subDexFilter;
        } else {
          subDexFilterSelect.value = "all";
        }
        subDexFilterSelect.style.display = currentGameTab === "national" ? "none" : "";

        // Ensure UI elements match loaded state
        variantToggle.textContent = showVariantsEnabled ? "Variants: Shown" : "Variants: Hidden";
        variantToggle.classList.toggle("active", showVariantsEnabled);
        stateFilterSelect.value = loadedUiState.stateFilter;
        document.querySelectorAll(".nav-tab").forEach(t => t.classList.toggle("active", t.dataset.game === currentGameTab));
        searchBox.value = loadedUiState.search || "";
        
        applyFilters();

      } catch (error) {
        grid.innerHTML = `<div style="padding: 60px 20px; text-align:center; color:#ef4444;"><b>Failed to load Pokémon database.</b><br><small>Check your internet connection and refresh the page.</small></div>`;
      }
    }

    bootTracker();
  </script>
</body>
</html>
